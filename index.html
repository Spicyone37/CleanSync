<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0d12">
  <title>CleanSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* =====================================================
       DESIGN SYSTEM
       Aesthetic : "Opérationnel de nuit" — outil professionnel
       pensé pour une utilisation rapide sur iPhone dans
       un contexte de gestion locative. Minimalisme industriel,
       typographie forte, hiérarchie d'info très nette.
       ===================================================== */
    :root {
      /* Palette */
      --ink:       #0c0d12;
      --ink-2:     #131520;
      --ink-3:     #1b1d28;
      --ink-4:     #242636;
      --line:      #2c2f42;
      --line-2:    #383b52;
      --fog:       #565a7a;
      --mist:      #8b8fa8;
      --pale:      #c8cbdc;
      --snow:      #eceef5;

      --gold:      #f0c040;
      --gold-2:    #c99020;
      --gold-glow: rgba(240,192,64,.15);
      --gold-dim:  rgba(240,192,64,.08);

      --jade:      #3ecf8e;
      --jade-dim:  rgba(62,207,142,.1);

      --coral:     #f06060;
      --coral-dim: rgba(240,96,96,.1);

      --sky:       #60a8f0;
      --sky-dim:   rgba(96,168,240,.1);

      --r: 12px;
      --r-sm: 8px;
      --r-lg: 18px;
      --r-pill: 999px;

      /* Fonts */
      --f-display: 'Syne', sans-serif;
      --f-body:    'Instrument Sans', sans-serif;

      /* Transitions */
      --ease: cubic-bezier(.22,.68,0,1.2);
      --ease-out: cubic-bezier(0,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-tap-highlight-color: transparent;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--f-body);
      background: var(--ink);
      color: var(--snow);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* =====================================================
       AUTH SCREEN
       ===================================================== */
    #auth {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      position: relative;
      overflow: hidden;
    }

    /* Animated background grid */
    #auth::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .4;
      animation: gridDrift 20s linear infinite;
    }
    #auth::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(240,192,64,.08) 0%, transparent 70%);
    }
    @keyframes gridDrift {
      to { transform: translate(48px, 48px); }
    }

    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .auth-brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 0 1px rgba(240,192,64,.3), 0 8px 24px rgba(240,192,64,.2);
    }
    .auth-brand-name {
      font-family: var(--f-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--snow);
    }
    .auth-brand-tagline {
      font-size: 13px;
      color: var(--fog);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .auth-card {
      background: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 32px 28px;
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      background: var(--ink-3);
      border-radius: var(--r-sm);
      padding: 3px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px 12px;
      border: none;
      background: transparent;
      color: var(--fog);
      font-family: var(--f-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .02em;
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .auth-tab.on {
      background: var(--ink-4);
      color: var(--snow);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    .auth-field { margin-bottom: 16px; }
    .auth-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--fog);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 7px;
    }
    .auth-field input {
      width: 100%;
      background: var(--ink-3);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 13px 16px;
      color: var(--snow);
      font-family: var(--f-body);
      font-size: 16px; /* prevents zoom on iPhone */
      transition: border-color .15s, box-shadow .15s;
    }
    .auth-field input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    .auth-field input::placeholder { color: var(--fog); }

    .auth-submit {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: var(--r-sm);
      font-family: var(--f-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .auth-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12) 0%, transparent 100%);
    }
    .auth-submit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,192,64,.3); }
    .auth-submit:active { transform: translateY(0); }
    .auth-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .auth-err {
      background: var(--coral-dim);
      border: 1px solid rgba(240,96,96,.25);
      border-radius: var(--r-sm);
      padding: 11px 14px;
      color: var(--coral);
      font-size: 13px;
      margin-top: 14px;
      animation: slideDown .2s ease;
    }
    .auth-plan-note {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: var(--fog);
    }
    .auth-plan-note span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      background: var(--ink-3);
      border: 1px solid var(--line);
      border-radius: var(--r-pill);
      padding: 4px 12px;
      color: var(--jade);
      font-size: 12px;
    }

    /* =====================================================
       APP SHELL
       ===================================================== */
    #app {
      display: none;
      min-height: 100dvh;
    }
    #app.on { display: flex; flex-direction: column; }

    /* =====================================================
       SUPABASE CONFIG BANNER (shown when not configured)
       ===================================================== */
    .config-banner {
      background: linear-gradient(90deg, rgba(240,192,64,.1), rgba(62,207,142,.08));
      border-bottom: 1px solid rgba(240,192,64,.2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--pale);
      flex-wrap: wrap;
    }
    .config-banner strong { color: var(--gold); }
    .config-banner code {
      background: var(--ink-4);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 12px;
      color: var(--jade);
    }

    /* =====================================================
       DESKTOP LAYOUT
       ===================================================== */
    .shell {
      flex: 1;
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    /* =====================================================
       SIDEBAR
       ===================================================== */
    .sidebar {
      background: var(--ink-2);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 20px 10px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 10px 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .sidebar-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .sidebar-logo-name {
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .nav-group { margin-bottom: 6px; }
    .nav-group-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--fog);
      text-transform: uppercase;
      letter-spacing: .14em;
      padding: 8px 12px 5px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--mist);
      font-family: var(--f-body);
      font-size: 13.5px;
      font-weight: 500;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all .15s;
      position: relative;
      text-align: left;
    }
    .nav-btn:hover { background: var(--ink-3); color: var(--snow); }
    .nav-btn.on {
      background: var(--gold-dim);
      color: var(--gold);
    }
    .nav-btn.on .nav-ico { color: var(--gold); }
    .nav-ico { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

    /* Pill badge */
    .nav-pill {
      margin-left: auto;
      background: var(--coral);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: var(--r-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }
    .nav-btn:not(.on) .nav-pill { background: var(--ink-4); color: var(--fog); }

    /* Premium lock */
    .nav-lock {
      margin-left: auto;
      font-size: 11px;
      color: var(--fog);
    }

    .sidebar-bottom {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--ink-3);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gold-dim), var(--jade-dim));
      border: 1px solid var(--line-2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .user-info { min-width: 0; }
    .user-email { font-size: 12px; color: var(--mist); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-plan  { font-size: 11px; font-weight: 600; }
    .user-plan.free    { color: var(--mist); }
    .user-plan.premium { color: var(--gold); }

    .upgrade-cta {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: var(--ink);
      border: none;
      border-radius: var(--r-sm);
      font-family: var(--f-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 6px;
    }
    .upgrade-cta:hover { filter: brightness(1.1); }

    .logout-cta {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--fog);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      font-family: var(--f-body);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .logout-cta:hover { color: var(--coral); border-color: var(--coral); }

    /* =====================================================
       MAIN AREA
       ===================================================== */
    .main {
      min-height: 100vh;
      overflow-y: auto;
      position: relative;
    }

    .page {
      display: none;
      padding: 36px 32px 60px;
      max-width: 1280px;
      margin: 0 auto;
      animation: pageFadeIn .2s ease;
    }
    .page.on { display: block; }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: none; }
    }

    /* Page header */
    .ph {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .ph-title {
      font-family: var(--f-display);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    .ph-sub { font-size: 13px; color: var(--fog); margin-top: 4px; }
    .ph-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* =====================================================
       STATS GRID
       ===================================================== */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .sc {
      background: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 18px 20px;
      cursor: default;
      transition: border-color .2s, transform .2s var(--ease);
    }
    .sc:hover { border-color: var(--line-2); transform: translateY(-2px); }
    .sc-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--fog);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    .sc-val {
      font-family: var(--f-display);
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.02em;
    }
    .sc-val.g { color: var(--gold); }
    .sc-val.j { color: var(--jade); }
    .sc-val.c { color: var(--coral); }
    .sc-val.s { color: var(--sky); }
    .sc-trend { font-size: 11px; color: var(--fog); margin-top: 6px; }

    /* =====================================================
       CARDS
       ===================================================== */
    .card {
      background: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 18px;
    }
    .card-h {
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-h-title {
      font-family: var(--f-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-count {
      background: var(--ink-4);
      border-radius: var(--r-pill);
      padding: 3px 10px;
      font-size: 11px;
      color: var(--mist);
    }
    .card-body { padding: 20px; }

    /* =====================================================
       TABLE
       ===================================================== */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--fog);
      background: rgba(255,255,255,.01);
      white-space: nowrap;
      border-bottom: 1px solid var(--line);
    }
    tbody td {
      padding: 13px 16px;
      font-size: 13.5px;
      border-top: 1px solid rgba(255,255,255,.03);
      vertical-align: middle;
    }
    tbody tr { transition: background .1s; }
    tbody tr:hover td { background: rgba(255,255,255,.025); }
    .empty-td {
      text-align: center;
      padding: 52px 20px !important;
      color: var(--fog);
      font-size: 13px;
    }

    /* =====================================================
       BADGES & TAGS
       ===================================================== */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: var(--r-pill);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-gold  { background: var(--gold-dim);  color: var(--gold); }
    .tag-jade  { background: var(--jade-dim);  color: var(--jade); }
    .tag-coral { background: var(--coral-dim); color: var(--coral); }
    .tag-sky   { background: var(--sky-dim);   color: var(--sky); }
    .tag-dim   { background: rgba(255,255,255,.05); color: var(--fog); }

    .platform {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .p-airbnb  { background: rgba(255,90,71,.15); color: #ff7a67; }
    .p-booking { background: var(--sky-dim); color: var(--sky); }
    .p-direct  { background: var(--jade-dim); color: var(--jade); }
    .p-autre   { background: rgba(255,255,255,.06); color: var(--fog); }

    /* =====================================================
       BUTTONS
       ===================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: var(--r-sm);
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .btn:active { transform: scale(.97); }

    .btn-p  { background: var(--gold); color: var(--ink); }
    .btn-p:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .btn-g  { background: transparent; color: var(--mist); border: 1px solid var(--line); }
    .btn-g:hover { color: var(--snow); border-color: var(--line-2); }

    .btn-d  { background: var(--coral-dim); color: var(--coral); }
    .btn-d:hover { background: rgba(240,96,96,.18); }

    .btn-j  { background: var(--jade-dim); color: var(--jade); }
    .btn-j:hover { background: rgba(62,207,142,.18); }

    .btn-s  { background: var(--sky-dim); color: var(--sky); }
    .btn-s:hover { background: rgba(96,168,240,.18); }

    .btn-iphone {
      background: linear-gradient(135deg, #30d158, #1d8a39);
      color: #fff;
      font-weight: 700;
      padding: 14px 22px;
      border-radius: 30px;
      font-size: 14px;
      box-s

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CleanSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0d12;
      color: #eceef5;
      min-height: 100vh;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: #131520;
      border: 1px solid #2c2f42;
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .auth-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #f0c040, #c99020);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b8fa8;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1b1d28;
      border: 1px solid #2c2f42;
      border-radius: 12px;
      color: #eceef5;
      font-size: 16px;
    }

    .input-group input:focus {
      outline: none;
      border-color: #f0c040;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f0c040, #c99020);
      color: #0c0d12;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(240, 192, 64, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #2c2f42;
      color: #8b8fa8;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #1b1d28;
      padding: 4px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #8b8fa8;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .tab.active {
      background: #242636;
      color: #f0c040;
    }

    .error-message {
      background: rgba(240, 96, 96, 0.1);
      border: 1px solid rgba(240, 96, 96, 0.25);
      border-radius: 8px;
      padding: 12px;
      color: #f06060;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .success-message {
      background: rgba(62, 207, 142, 0.1);
      border: 1px solid rgba(62, 207, 142, 0.25);
      border-radius: 8px;
      padding: 12px;
      color: #3ecf8e;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .app-container {
      display: none;
      min-height: 100vh;
    }

    .app-container.active {
      display: block;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: #131520;
      border-right: 1px solid #2c2f42;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .main-content {
      margin-left: 260px;
      padding: 24px 32px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 12px;
      cursor: pointer;
      color: #8b8fa8;
      transition: all 0.2s;
      width: 100%;
      background: transparent;
      border: none;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-item:hover {
      background: #1b1d28;
      color: #eceef5;
    }

    .nav-item.active {
      background: rgba(240, 192, 64, 0.1);
      color: #f0c040;
    }

    .card {
      background: #131520;
      border: 1px solid #2c2f42;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #131520;
      border: 1px solid #2c2f42;
      border-radius: 16px;
      padding: 20px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #f0c040;
      margin-top: 8px;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 12px;
      width: auto;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
        z-index: 1000;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        padding: 16px;
      }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1b1d28;
      border: 1px solid #2c2f42;
      border-radius: 12px;
      padding: 12px 20px;
      animation: slideIn 0.3s ease;
      z-index: 2000;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      align-items: center;
      justify-content: center;
      z-index: 1500;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #131520;
      border: 1px solid #2c2f42;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px;
      background: #1b1d28;
      border: 1px solid #2c2f42;
      border-radius: 12px;
      color: #eceef5;
      font-size: 14px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-container">
  <div class="auth-card">
    <div class="auth-title">
      <h1>🧹 CleanSync</h1>
      <p style="color: #8b8fa8; margin-top: 8px;">Gestion ménage professionnelle</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLoginBtn">Connexion</button>
      <button class="tab" id="tabRegisterBtn">Inscription</button>
    </div>

    <div id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="vous@exemple.com">
      </div>
      <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="loginBtn">Se connecter</button>
    </div>

    <div id="registerForm" style="display: none;">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="vous@exemple.com">
      </div>
      <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="registerPassword" placeholder="Minimum 8 caractères">
      </div>
      <div class="input-group">
        <label>Confirmer</label>
        <input type="password" id="registerPassword2" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="registerBtn">Créer un compte</button>
    </div>

    <div id="authError" class="error-message"></div>
    <div id="authSuccess" class="success-message"></div>
  </div>
</div>

<!-- App Container -->
<div id="appContainer" class="app-container">
  <div class="sidebar" id="sidebar">
    <div style="margin-bottom: 32px;">
      <h2 style="color: #f0c040;">🧹 CleanSync</h2>
      <p id="userEmail" style="color: #8b8fa8; font-size: 12px; margin-top: 8px;"></p>
    </div>
    
    <button class="nav-item active" data-page="dashboard">📊 Tableau de bord</button>
    <button class="nav-item" data-page="reservations">📅 Réservations</button>
    <button class="nav-item" data-page="logements">🏠 Logements</button>
    <button class="nav-item" data-page="societes">🏢 Sociétés</button>
    
    <div style="margin-top: auto; padding-top: 24px;">
      <button class="btn-secondary" id="logoutBtn" style="width: 100%; padding: 10px; background: transparent; border: 1px solid #2c2f42; border-radius: 12px; color: #8b8fa8; cursor: pointer;">Se déconnecter</button>
    </div>
  </div>

  <div class="main-content">
    <div id="dashboardPage" class="page active">
      <div class="header-bar">
        <h1>Tableau de bord</h1>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card">
        <h3>📋 Dernières réservations</h3>
        <div id="recentReservations"></div>
      </div>
    </div>

    <div id="reservationsPage" class="page">
      <div class="header-bar">
        <h1>Réservations</h1>
        <button class="btn btn-primary btn-sm" id="addResaBtn">+ Nouvelle réservation</button>
      </div>
      <div id="reservationsList"></div>
    </div>

    <div id="logementsPage" class="page">
      <div class="header-bar">
        <h1>Logements</h1>
        <button class="btn btn-primary btn-sm" id="addLogementBtn">+ Nouveau logement</button>
      </div>
      <div id="logementsList"></div>
    </div>

    <div id="societesPage" class="page">
      <div class="header-bar">
        <h1>Sociétés de ménage</h1>
        <button class="btn btn-primary btn-sm" id="addSocieteBtn">+ Nouvelle société</button>
      </div>
      <div id="societesList"></div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="reservationModal" class="modal">
  <div class="modal-content">
    <h3>Nouvelle réservation</h3>
    <select id="resaLot"></select>
    <input type="date" id="resaCheckin" placeholder="Date d'arrivée">
    <input type="date" id="resaCheckout" placeholder="Date de départ">
    <button class="btn btn-primary" id="saveResaBtn">Enregistrer</button>
    <button class="btn btn-secondary" id="closeResaModal">Annuler</button>
  </div>
</div>

<div id="logementModal" class="modal">
  <div class="modal-content">
    <h3>Nouveau logement</h3>
    <input type="text" id="logNom" placeholder="Nom du logement">
    <input type="text" id="logAdresse" placeholder="Adresse">
    <textarea id="logCode" placeholder="Code d'accès (optionnel)" rows="3"></textarea>
    <button class="btn btn-primary" id="saveLogementBtn">Enregistrer</button>
    <button class="btn btn-secondary" id="closeLogementModal">Annuler</button>
  </div>
</div>

<div id="societeModal" class="modal">
  <div class="modal-content">
    <h3>Nouvelle société</h3>
    <input type="text" id="socNom" placeholder="Nom de la société">
    <input type="tel" id="socTel" placeholder="Téléphone">
    <button class="btn btn-primary" id="saveSocieteBtn">Enregistrer</button>
    <button class="btn btn-secondary" id="closeSocieteModal">Annuler</button>
  </div>
</div>

<script>
// Éviter les conflits de variables globales
(function() {
  console.log('🚀 Application démarrée');
  
  // Configuration Supabase - utilisation de const pour éviter le shadowing
  const SUPABASE_URL = 'https://kwwfdhrlvbfdmkmxpwde.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_OfteszLNcXEDesXqITBJ9w_c-yU8Las';
  
  let supabaseClient = null;
  let currentUser = null;
  let societes = [];
  let logements = [];
  let reservations = [];
  
  // Initialisation
  async function init() {
    console.log('📦 Initialisation...');
    try {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('✅ Supabase initialisé');
      
      const { data: { session } } = await supabaseClient.auth.getSession();
      console.log('Session existante:', session ? 'Oui' : 'Non');
      
      if (session?.user) {
        currentUser = session.user;
        await loadUserData();
      }
      
      // Attacher les événements
      attachEvents();
      
    } catch (error) {
      console.error('❌ Erreur init:', error);
      showError('authError', 'Erreur de connexion: ' + error.message);
    }
  }
  
  function attachEvents() {
    console.log('🔗 Attachement des événements...');
    
    // Tabs
    const tabLoginBtn = document.getElementById('tabLoginBtn');
    const tabRegisterBtn = document.getElementById('tabRegisterBtn');
    if (tabLoginBtn) tabLoginBtn.onclick = () => switchTab('login');
    if (tabRegisterBtn) tabRegisterBtn.onclick = () => switchTab('register');
    
    // Boutons auth
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    if (loginBtn) loginBtn.onclick = handleLogin;
    if (registerBtn) registerBtn.onclick = handleRegister;
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.onclick = () => navigateTo(btn.getAttribute('data-page'));
    });
    
    // Logout
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.onclick = handleLogout;
    
    // Modals
    const addResaBtn = document.getElementById('addResaBtn');
    const addLogementBtn = document.getElementById('addLogementBtn');
    const addSocieteBtn = document.getElementById('addSocieteBtn');
    
    if (addResaBtn) addResaBtn.onclick = showReservationModal;
    if (addLogementBtn) addLogementBtn.onclick = showLogementModal;
    if (addSocieteBtn) addSocieteBtn.onclick = showSocieteModal;
    
    const saveResaBtn = document.getElementById('saveResaBtn');
    const saveLogementBtn = document.getElementById('saveLogementBtn');
    const saveSocieteBtn = document.getElementById('saveSocieteBtn');
    
    if (saveResaBtn) saveResaBtn.onclick = saveReservation;
    if (saveLogementBtn) saveLogementBtn.onclick = saveLogement;
    if (saveSocieteBtn) saveSocieteBtn.onclick = saveSociete;
    
    const closeResaModal = document.getElementById('closeResaModal');
    const closeLogementModal = document.getElementById('closeLogementModal');
    const closeSocieteModal = document.getElementById('closeSocieteModal');
    
    if (closeResaModal) closeResaModal.onclick = () => closeModal('reservationModal');
    if (closeLogementModal) closeLogementModal.onclick = () => closeModal('logementModal');
    if (closeSocieteModal) closeSocieteModal.onclick = () => closeModal('societeModal');
    
    console.log('✅ Événements attachés');
  }
  
  async function loadUserData() {
    console.log('👤 Chargement des données utilisateur...');
    try {
      const authScreen = document.getElementById('authScreen');
      const appContainer = document.getElementById('appContainer');
      const userEmailSpan = document.getElementById('userEmail');
      
      if (authScreen) authScreen.style.display = 'none';
      if (appContainer) appContainer.classList.add('active');
      if (userEmailSpan) userEmailSpan.textContent = currentUser.email;
      
      await loadAllData();
      renderAll();
      console.log('✅ Données chargées');
    } catch (error) {
      console.error('❌ Erreur chargement:', error);
      showToast('Erreur: ' + error.message);
    }
  }
  
  async function loadAllData() {
    try {
      const [societesRes, logementsRes, reservationsRes] = await Promise.all([
        supabaseClient.from('societes').select('*').eq('user_id', currentUser.id),
        supabaseClient.from('logements').select('*').eq('user_id', currentUser.id),
        supabaseClient.from('reservations').select('*').eq('user_id', currentUser.id)
      ]);
      
      if (societesRes.error) throw societesRes.error;
      if (logementsRes.error) throw logementsRes.error;
      if (reservationsRes.error) throw reservationsRes.error;
      
      societes = societesRes.data || [];
      logements = logementsRes.data || [];
      reservations = reservationsRes.data || [];
      
      console.log(`📊 Données: ${societes.length} sociétés, ${logements.length} logements, ${reservations.length} réservations`);
      
    } catch (error) {
      console.error('Erreur chargement données:', error);
      throw error;
    }
  }
  
  async function handleLogin() {
    console.log('🔐 Tentative de connexion...');
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showError('authError', 'Veuillez remplir tous les champs');
      return;
    }
    
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      console.log('✅ Connexion réussie');
      currentUser = data.user;
      await loadUserData();
    } catch (error) {
      console.error('❌ Erreur login:', error);
      showError('authError', error.message);
    }
  }
  
  async function handleRegister() {
    console.log('📝 Tentative d\'inscription...');
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const password2 = document.getElementById('registerPassword2').value;
    
    if (!email || !password) {
      showError('authError', 'Veuillez remplir tous les champs');
      return;
    }
    
    if (password !== password2) {
      showError('authError', 'Les mots de passe ne correspondent pas');
      return;
    }
    
    if (password.length < 8) {
      showError('authError', 'Le mot de passe doit faire au moins 8 caractères');
      return;
    }
    
    try {
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      console.log('✅ Inscription réussie');
      
      const successDiv = document.getElementById('authSuccess');
      if (successDiv) {
        successDiv.textContent = 'Compte créé ! Vous pouvez maintenant vous connecter';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          successDiv.style.display = 'none';
          switchTab('login');
          const loginEmail = document.getElementById('loginEmail');
          if (loginEmail) loginEmail.value = email;
        }, 2000);
      }
      
    } catch (error) {
      console.error('❌ Erreur inscription:', error);
      showError('authError', error.message);
    }
  }
  
  async function handleLogout() {
    console.log('🚪 Déconnexion...');
    await supabaseClient.auth.signOut();
    window.location.reload();
  }
  
  async function saveReservation() {
    const logementId = document.getElementById('resaLot').value;
    const checkin = document.getElementById('resaCheckin').value;
    const checkout = document.getElementById('resaCheckout').value;
    
    if (!logementId || !checkin || !checkout) {
      showToast('Veuillez remplir tous les champs');
      return;
    }
    
    try {
      const { error } = await supabaseClient.from('reservations').insert({
        user_id: currentUser.id,
        logement_id: logementId,
        checkin,
        checkout
      });
      if (error) throw error;
      
      await loadAllData();
      renderAll();
      closeModal('reservationModal');
      showToast('Réservation ajoutée');
    } catch (error) {
      showToast('Erreur: ' + error.message);
    }
  }
  
  async function saveLogement() {
    const nom = document.getElementById('logNom').value;
    const adresse = document.getElementById('logAdresse').value;
    const code = document.getElementById('logCode').value;
    
    if (!nom) {
      showToast('Le nom du logement est requis');
      return;
    }
    
    try {
      const { error } = await supabaseClient.from('logements').insert({
        user_id: currentUser.id,
        nom,
        adresse,
        code
      });
      if (error) throw error;
      
      await loadAllData();
      renderAll();
      closeModal('logementModal');
      showToast('Logement ajouté');
    } catch (error) {
      showToast('Erreur: ' + error.message);
    }
  }
  
  async function saveSociete() {
    const nom = document.getElementById('socNom').value;
    const tel = document.getElementById('socTel').value;
    
    if (!nom) {
      showToast('Le nom de la société est requis');
      return;
    }
    
    try {
      const { error } = await supabaseClient.from('societes').insert({
        user_id: currentUser.id,
        nom,
        tel
      });
      if (error) throw error;
      
      await loadAllData();
      renderAll();
      closeModal('societeModal');
      showToast('Société ajoutée');
    } catch (error) {
      showToast('Erreur: ' + error.message);
    }
  }
  
  function renderAll() {
    renderDashboard();
    renderReservations();
    renderLogements();
    renderSocietes();
  }
  
  function renderDashboard() {
    const statsGrid = document.getElementById('statsGrid');
    if (statsGrid) {
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div>🏠 Logements</div>
          <div class="stat-value">${logements.length}</div>
        </div>
        <div class="stat-card">
          <div>🏢 Sociétés</div>
          <div class="stat-value">${societes.length}</div>
        </div>
        <div class="stat-card">
          <div>📅 Réservations</div>
          <div class="stat-value">${reservations.length}</div>
        </div>
      `;
    }
    
    const recentDiv = document.getElementById('recentReservations');
    const today = new Date().toISOString().split('T')[0];
    const upcoming = reservations.filter(r => r.checkout >= today).slice(0, 5);
    
    if (recentDiv) {
      if (upcoming.length === 0) {
        recentDiv.innerHTML = '<p style="color: #8b8fa8;">Aucune réservation à venir</p>';
      } else {
        recentDiv.innerHTML = upcoming.map(r => {
          const log = logements.find(l => l.id === r.logement_id);
          return `<div style="padding: 12px; border-bottom: 1px solid #2c2f42;">
            <strong>${escapeHtml(log?.nom || 'Logement')}</strong><br>
            Du ${r.checkin} au ${r.checkout}
          </div>`;
        }).join('');
      }
    }
  }
  
  function renderReservations() {
    const container = document.getElementById('reservationsList');
    if (!container) return;
    
    if (reservations.length === 0) {
      container.innerHTML = '<div class="card"><p style="color: #8b8fa8;">Aucune réservation</p></div>';
      return;
    }
    
    container.innerHTML = reservations.map(r => {
      const log = logements.find(l => l.id === r.logement_id);
      return `<div class="card">
        <strong>${escapeHtml(log?.nom || 'Logement')}</strong><br>
        Du ${r.checkin} au ${r.checkout}
      </div>`;
    }).join('');
  }
  
  function renderLogements() {
    const container = document.getElementById('logementsList');
    if (!container) return;
    
    if (logements.length === 0) {
      container.innerHTML = '<div class="card"><p style="color: #8b8fa8;">Aucun logement</p></div>';
      return;
    }
    
    container.innerHTML = logements.map(l => `
      <div class="card">
        <strong>${escapeHtml(l.nom)}</strong><br>
        <small>${escapeHtml(l.adresse || 'Adresse non renseignée')}</small>
        ${l.code ? `<br><small>🔑 ${escapeHtml(l.code)}</small>` : ''}
      </div>
    `).join('');
  }
  
  function renderSocietes() {
    const container = document.getElementById('societesList');
    if (!container) return;
    
    if (societes.length === 0) {
      container.innerHTML = '<div class="card"><p style="color: #8b8fa8;">Aucune société</p></div>';
      return;
    }
    
    container.innerHTML = societes.map(s => `
      <div class="card">
        <strong>${escapeHtml(s.nom)}</strong><br>
        <small>📞 ${escapeHtml(s.tel || 'Téléphone non renseigné')}</small>
      </div>
    `).join('');
  }
  
  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabLogin = document.getElementById('tabLoginBtn');
    const tabRegister = document.getElementById('tabRegisterBtn');
    
    if (tab === 'login') {
      if (loginForm) loginForm.style.display = 'block';
      if (registerForm) registerForm.style.display = 'none';
      if (tabLogin) tabLogin.classList.add('active');
      if (tabRegister) tabRegister.classList.remove('active');
    } else {
      if (loginForm) loginForm.style.display = 'none';
      if (registerForm) registerForm.style.display = 'block';
      if (tabLogin) tabLogin.classList.remove('active');
      if (tabRegister) tabRegister.classList.add('active');
    }
  }
  
  function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const targetPage = document.getElementById(`${page}Page`);
    if (targetPage) targetPage.classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
  }
  
  function showReservationModal() {
    const select = document.getElementById('resaLot');
    if (select) {
      select.innerHTML = '<option value="">Sélectionner un logement</option>' +
        logements.map(l => `<option value="${l.id}">${escapeHtml(l.nom)}</option>`).join('');
    }
    const modal = document.getElementById('reservationModal');
    if (modal) modal.classList.add('active');
  }
  
  function showLogementModal() {
    const nomInput = document.getElementById('logNom');
    const adresseInput = document.getElementById('logAdresse');
    const codeInput = document.getElementById('logCode');
    if (nomInput) nomInput.value = '';
    if (adresseInput) adresseInput.value = '';
    if (codeInput) codeInput.value = '';
    const modal = document.getElementById('logementModal');
    if (modal) modal.classList.add('active');
  }
  
  function showSocieteModal() {
    const nomInput = document.getElementById('socNom');
    const telInput = document.getElementById('socTel');
    if (nomInput) nomInput.value = '';
    if (telInput) telInput.value = '';
    const modal = document.getElementById('societeModal');
    if (modal) modal.classList.add('active');
  }
  
  function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.classList.remove('active');
  }
  
  function showError(elementId, message) {
    const errorEl = document.getElementById(elementId);
    if (errorEl) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 5000);
    }
  }
  
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `✅ ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Démarrer l'application
  init();
})();
</script>
</body>
</html>
